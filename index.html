<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEF Maîtrise - Expert Training</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                // Fixed Lucide icon rendering logic
                if (window.lucide && ref.current) {
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase());
                    if (className) iconElement.setAttribute('class', className);
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    
                    ref.current.innerHTML = '';
                    ref.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: {
                            strokeWidth: 2,
                            width: size,
                            height: size
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const apiKey = ""; 

        const CONTENT = {
            Examen: [
                { type: 'reading', text: "L'ubiquité des algorithmes dans la sphère publique soulève des interrogations épistémologiques.", question: "Quelle est l'idée principale ?", options: ["Outils neutres", "Influence cognitive", "Accès difficile", "Survie démocratique"], correct: 1 },
                { type: 'reading', text: "Malgré les velléités de réforme, l'inertie administrative a eu raison du projet.", question: "Que signifie 'avoir eu raison de' ?", options: ["Soutenir", "Expliquer", "Triompher de", "Négocier"], correct: 2 }
            ],
            Quiz: [
                { type: 'audio', text: "Où se trouve la boulangerie la plus proche ?", question: "Réponse logique :", options: ["Au coin de la rue", "À midi pile", "C'est rouge"], correct: 0 },
                { type: 'grammar', text: "Si j'____ su, je ne serais pas venu.", question: "Complétez :", options: ["avais", "aurais", "eusse", "ai"], correct: 2 }
            ]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('Examen');
            const [quizState, setQuizState] = useState('idle'); // 'idle', 'active', 'finished'
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [feedback, setFeedback] = useState(null);
            const [loading, setLoading] = useState(false);

            const [messages, setMessages] = useState([{ role: 'assistant', content: 'Bonjour ! Prêt pour un entraînement niveau C2 ?' }]);
            const [input, setInput] = useState("");

            const resetQuiz = (tab) => {
                setActiveTab(tab);
                setQuizState('idle');
                setQuizIndex(0);
                setScore(0);
                setFeedback(null);
            };

            const handleAnswer = (idx) => {
                const questions = CONTENT[activeTab];
                if (idx === questions[quizIndex].correct) setScore(s => s + 1);
                
                if (quizIndex < questions.length - 1) {
                    setQuizIndex(quizIndex + 1);
                } else {
                    setQuizState('finished');
                }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* Header */}
                    <nav className="flex items-center justify-between px-6 h-16 border-b border-white/10 bg-black sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-6 bg-blue-600 rounded-full"></div>
                            <span className="font-black uppercase tracking-tighter italic">TEF Maîtrise</span>
                        </div>
                        <div className="flex gap-4 md:gap-8 overflow-x-auto no-scrollbar">
                            {['Examen', 'Quiz', 'Speaking', 'Tuteur'].map(tab => (
                                <button 
                                    key={tab} 
                                    onClick={() => resetQuiz(tab)}
                                    className={`text-[10px] font-bold uppercase tracking-widest whitespace-nowrap px-2 py-4 ${activeTab === tab ? 'text-blue-500 border-b-2 border-blue-500' : 'text-zinc-500'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto p-4 bg-[#050505]">
                        <div className="max-w-xl mx-auto py-6">
                            
                            {(activeTab === 'Examen' || activeTab === 'Quiz') && (
                                <div className="animate-in">
                                    {quizState === 'idle' ? (
                                        <div className="text-center py-20 bg-zinc-900/30 rounded-[3rem] border border-white/5 p-10">
                                            <h2 className="text-4xl font-black italic mb-6">Mode {activeTab}</h2>
                                            <p className="text-zinc-500 mb-8 italic">Préparez-vous à l'excellence linguistique.</p>
                                            <button 
                                                onClick={() => setQuizState('active')}
                                                className="bg-white text-black px-12 py-4 rounded-full font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all"
                                            >
                                                Commencer
                                            </button>
                                        </div>
                                    ) : quizState === 'active' ? (
                                        <div className="space-y-6">
                                            <div className="flex justify-between items-center px-2">
                                                <span className="text-[10px] font-black text-zinc-500 uppercase">Question {quizIndex + 1} / {CONTENT[activeTab].length}</span>
                                                <div className="h-1 flex-1 mx-4 bg-zinc-800 rounded-full overflow-hidden">
                                                    <div className="h-full bg-blue-600 transition-all duration-500" style={{width: `${((quizIndex+1)/CONTENT[activeTab].length)*100}%`}}></div>
                                                </div>
                                            </div>
                                            <div className="bg-zinc-900 border border-white/10 rounded-[2.5rem] p-8 space-y-6">
                                                <p className="text-zinc-400 italic leading-relaxed text-lg border-l-4 border-blue-600 pl-4">
                                                    {CONTENT[activeTab][quizIndex].text}
                                                </p>
                                                <h3 className="font-bold text-xl">{CONTENT[activeTab][quizIndex].question}</h3>
                                                <div className="grid gap-3">
                                                    {CONTENT[activeTab][quizIndex].options.map((opt, i) => (
                                                        <button 
                                                            key={i} 
                                                            onClick={() => handleAnswer(i)}
                                                            className="w-full text-left p-5 bg-zinc-800 rounded-2xl hover:bg-zinc-700 hover:scale-[1.02] transition-all font-medium border border-white/5"
                                                        >
                                                            {opt}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center py-20 bg-zinc-900/30 rounded-[3rem] border border-white/5 p-10 animate-in">
                                            <h2 className="text-5xl font-black italic mb-4">Terminé !</h2>
                                            <div className="text-6xl font-black text-blue-500 mb-6">{score} / {CONTENT[activeTab].length}</div>
                                            <button onClick={() => resetQuiz(activeTab)} className="text-zinc-500 font-bold uppercase underline">Recommencer</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'Speaking' && (
                                <div className="animate-in flex flex-col items-center gap-8 py-10">
                                    <div className="text-center">
                                        <h2 className="text-4xl font-black uppercase italic tracking-tighter">Entraînement Oral</h2>
                                        <p className="text-zinc-500 italic mt-2">Votre prononciation est analysée en temps réel.</p>
                                    </div>
                                    <button 
                                        onClick={() => setIsRecording(!isRecording)}
                                        className={`w-32 h-32 rounded-full flex items-center justify-center transition-all shadow-2xl ${isRecording ? 'bg-red-600 animate-pulse' : 'bg-zinc-900 border border-white/10'}`}
                                    >
                                        <Icon name={isRecording ? "Square" : "Mic"} size={40} className={isRecording ? "text-white" : "text-blue-500"} />
                                    </button>
                                    <div className="w-full bg-zinc-900 border border-white/10 rounded-3xl p-6 min-h-[150px] italic text-zinc-400">
                                        {transcript || "Appuyez sur le micro pour parler..."}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'Tuteur' && (
                                <div className="flex flex-col h-[70vh] bg-zinc-900/30 border border-white/10 rounded-[2rem] overflow-hidden animate-in">
                                    <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[85%] p-4 rounded-2xl text-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-zinc-800 border border-white/5 text-zinc-200'}`}>
                                                    {m.content}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-4 bg-black border-t border-white/5 flex gap-2">
                                        <input 
                                            className="flex-1 bg-zinc-900 rounded-xl px-4 py-3 outline-none focus:ring-1 ring-blue-500" 
                                            placeholder="Posez votre question..."
                                            value={input}
                                            onChange={e => setInput(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && setMessages([...messages, {role:'user', content: input}])}
                                        />
                                        <button className="bg-blue-600 p-3 px-6 rounded-xl font-bold uppercase text-[10px]">Envoyer</button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
