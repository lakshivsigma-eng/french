<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEF Maîtrise - Expert Training</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    const iconElement = document.createElement('i');
                    const dashName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconElement.setAttribute('data-lucide', dashName);
                    if (className) iconElement.setAttribute('class', className);
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    ref.current.innerHTML = '';
                    ref.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { strokeWidth: 2, width: size, height: size },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const apiKey = ""; 

        const CONTENT = {
            Examen: [
                { 
                    type: 'reading', 
                    text: "L'ubiquité des algorithmes dans la sphère publique soulève des interrogations épistémologiques quant à la neutralité de l'information. Bien que présentés comme de simples vecteurs techniques, ils agissent en réalité comme des filtres cognitifs façonnant notre perception du réel.", 
                    question: "Quelle est l'idée principale de ce texte ?", 
                    options: [
                        "Les algorithmes sont des outils purement techniques et impartiaux.",
                        "La neutralité algorithmique est un mythe qui influence notre cognition.",
                        "L'information numérique est devenue inaccessible au grand public.",
                        "Le filtrage des données est nécessaire à la survie de la démocratie."
                    ], 
                    correct: 1 
                },
                { 
                    type: 'reading', 
                    text: "Malgré les velléités de réforme, l'inertie administrative semble avoir eu raison de l'enthousiasme initial des acteurs de terrain, reléguant le projet au rang des vains espoirs déçus.", 
                    question: "Que signifie 'avoir eu raison de' dans ce contexte ?", 
                    options: [
                        "Avoir soutenu efficacement.",
                        "Avoir donné une explication logique.",
                        "Avoir triomphé ou causé l'échec de.",
                        "Avoir entamé une négociation."
                    ], 
                    correct: 2 
                }
            ],
            Quiz: [
                { 
                    type: 'audio', 
                    text: "Si j'eusse su que les circonstances eussent été si peu clémentes, j'eusse sans doute différé mon départ.", 
                    question: "Quelle forme verbale est utilisée pour exprimer le regret ?", 
                    options: ["Futur simple", "Passé composé", "Plus-que-parfait du subjonctif", "Imparfait"], 
                    correct: 2 
                },
                { 
                    type: 'audio', 
                    text: "Où se trouve la boulangerie la plus proche ?", 
                    question: "Réponse logique :", 
                    options: ["Au coin de la rue", "À midi pile", "C'est rouge"], 
                    correct: 0 
                }
            ]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('Examen');
            const [quizState, setQuizState] = useState('idle');
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [isSpeaking, setIsSpeaking] = useState(false);

            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [analysis, setAnalysis] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const recognitionRef = useRef(null);

            const [workshopText, setWorkshopText] = useState("");
            const [workshopFeedback, setWorkshopFeedback] = useState(null);

            const [messages, setMessages] = useState([{ role: 'assistant', content: 'Bonjour ! Je suis votre tuteur expert TEF. Je vais être très strict aujourd\'hui pour vous aider à atteindre le niveau C2.' }]);
            const [input, setInput] = useState("");

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'fr-FR';
                    recognitionRef.current.onresult = (e) => {
                        let str = "";
                        for (let i = 0; i < e.results.length; i++) str += e.results[i][0].transcript;
                        setTranscript(str);
                    };
                    recognitionRef.current.onend = () => setIsRecording(false);
                }
            }, []);

            const resetTab = (tab) => {
                setActiveTab(tab);
                setQuizState('idle');
                setQuizIndex(0);
                setScore(0);
                setAnalysis(null);
                setWorkshopFeedback(null);
            };

            const speakText = async (text) => {
                if (!text || isSpeaking) return;
                setIsSpeaking(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });
                    const data = await response.json();
                    const pcmBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (pcmBase64) {
                        const audioBlob = pcmToWav(pcmBase64, 24000);
                        const audio = new Audio(URL.createObjectURL(audioBlob));
                        audio.onended = () => setIsSpeaking(false);
                        await audio.play();
                    } else setIsSpeaking(false);
                } catch { setIsSpeaking(false); }
            };

            const pcmToWav = (base64Pcm, sampleRate) => {
                const pcmData = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0));
                const buffer = new ArrayBuffer(44 + pcmData.length);
                const view = new DataView(buffer);
                const writeString = (pos, str) => { for (let i = 0; i < str.length; i++) view.setUint8(pos + i, str.charCodeAt(i)); };
                writeString(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length, true); writeString(8, 'WAVE'); writeString(12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(36, 'data');
                view.setUint32(40, pcmData.length, true); new Uint8Array(buffer, 44).set(pcmData);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const handleAnalyze = async (text, mode) => {
                if (!text.trim()) return;
                setIsAnalyzing(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Analyse ce texte français (${mode}): "${text}". 
                            PROTOCOLE DE SÉVÉRITÉ :
                            - Bonjour / Phrases simples = A1.
                            - C2 exige : Subjonctif, connecteurs logiques rares (nonobstant), nuances rhétoriques.
                            Retourne JSON : {level: string, feedback: string, suggestionC2: string}` }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const res = JSON.parse(data.candidates[0].content.parts[0].text);
                    if (mode === 'oral') setAnalysis(res); else setWorkshopFeedback(res);
                } catch { } finally { setIsAnalyzing(false); }
            };

            const currentQuestions = CONTENT[activeTab] || [];
            const currentQ = currentQuestions[quizIndex];

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-[#050505]">
                    <nav className="flex items-center justify-between px-6 h-16 border-b border-white/10 bg-black z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-6 bg-blue-600 rounded-full"></div>
                            <span className="font-black uppercase tracking-tighter italic">TEF Maîtrise</span>
                        </div>
                        <div className="flex gap-4 md:gap-8 overflow-x-auto no-scrollbar">
                            {['Examen', 'Quiz', 'Speaking', 'Workshop', 'Tuteur'].map(tab => (
                                <button key={tab} onClick={() => resetTab(tab)} className={`text-[10px] font-bold uppercase tracking-widest px-2 py-4 ${activeTab === tab ? 'text-blue-500 border-b-2 border-blue-500' : 'text-zinc-500'}`}>{tab}</button>
                            ))}
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto p-4">
                        <div className="max-w-xl mx-auto py-6">
                            {(activeTab === 'Examen' || activeTab === 'Quiz') && (
                                <div className="animate-in">
                                    {quizState === 'idle' ? (
                                        <div className="text-center py-20 bg-zinc-900/30 rounded-[3rem] border border-white/5 p-10">
                                            <h2 className="text-4xl font-black italic mb-6">{activeTab} Expert</h2>
                                            <button onClick={() => setQuizState('active')} className="bg-white text-black px-12 py-4 rounded-full font-black uppercase tracking-widest hover:bg-blue-600 transition-all">Commencer</button>
                                        </div>
                                    ) : quizState === 'active' ? (
                                        <div className="space-y-6">
                                            <div className="bg-zinc-900 border border-white/10 rounded-[2.5rem] p-8 space-y-6 shadow-2xl">
                                                <div className="p-6 bg-black/40 rounded-2xl border border-white/5 italic text-lg leading-relaxed">{currentQ.text}</div>
                                                {currentQ.type === 'audio' && (
                                                    <button onClick={() => speakText(currentQ.text)} className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center mx-auto transition-transform hover:scale-110">
                                                        <Icon name={isSpeaking ? "Loader2" : "Volume2"} className={isSpeaking ? "animate-spin" : ""} />
                                                    </button>
                                                )}
                                                <h3 className="font-bold text-xl text-center">{currentQ.question}</h3>
                                                <div className="grid gap-3">
                                                    {currentQ.options.map((opt, i) => (
                                                        <button key={i} onClick={() => {
                                                            if (i === currentQ.correct) setScore(s => s + 1);
                                                            if (quizIndex < currentQuestions.length - 1) setQuizIndex(quizIndex + 1);
                                                            else setQuizState('finished');
                                                        }} className="w-full text-left p-5 bg-zinc-800 rounded-2xl hover:bg-zinc-700 transition-all border border-white/5">{opt}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center py-20 bg-zinc-900/30 rounded-[3rem] border border-white/5 p-10">
                                            <h2 className="text-5xl font-black italic mb-4">Score Final</h2>
                                            <div className="text-7xl font-black text-blue-500 mb-6">{score} / {currentQuestions.length}</div>
                                            <button onClick={() => resetTab(activeTab)} className="text-zinc-500 font-bold uppercase underline">Réessayer</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'Speaking' && (
                                <div className="animate-in flex flex-col items-center gap-8 py-10">
                                    <h2 className="text-4xl font-black uppercase italic tracking-tighter">Analyseur de Niveau</h2>
                                    <button onClick={() => { if (isRecording) { recognitionRef.current.stop(); handleAnalyze(transcript, 'oral'); } else { setTranscript(""); setIsRecording(true); recognitionRef.current.start(); } }} 
                                        className={`w-32 h-32 rounded-full flex items-center justify-center transition-all shadow-2xl ${isRecording ? 'bg-red-600 animate-pulse' : 'bg-zinc-900 border border-white/10'}`}>
                                        <Icon name={isRecording ? "X" : "Mic"} size={40} className={isRecording ? "text-white" : "text-blue-500"} />
                                    </button>
                                    <div className="w-full bg-zinc-900 border border-white/10 rounded-3xl p-6 min-h-[150px] italic text-zinc-400">
                                        {transcript || "Parlez pour évaluer votre niveau TEF..."}
                                    </div>
                                    {isAnalyzing && <div className="animate-pulse text-blue-500 font-bold uppercase text-xs">Analyse en cours...</div>}
                                    {analysis && (
                                        <div className="w-full bg-zinc-900 border border-white/5 rounded-[2rem] p-8 space-y-4 animate-in">
                                            <div className="flex justify-between items-center"><span className="text-[10px] font-black uppercase text-zinc-500 underline decoration-blue-500">Verdict</span><div className="px-4 py-1 bg-blue-600 rounded-full text-xs font-black uppercase">{analysis.level}</div></div>
                                            <p className="text-zinc-300 italic">"{analysis.feedback}"</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'Workshop' && (
                                <div className="animate-in space-y-6 py-4">
                                    <div className="bg-zinc-900/50 p-6 rounded-[2rem] border border-white/5"><p className="text-sm font-bold italic text-blue-400">Défi : Rédigez une critique socio-politique sur l'impact de la technologie.</p></div>
                                    <textarea value={workshopText} onChange={e => setWorkshopText(e.target.value)} placeholder="Écrivez ici..." className="w-full h-64 bg-zinc-900 border border-white/5 rounded-[2rem] p-8 text-lg focus:outline-none focus:border-blue-500 text-white" />
                                    <button onClick={() => handleAnalyze(workshopText, 'écrit')} disabled={isAnalyzing} className="w-full py-5 bg-white text-black rounded-2xl font-black uppercase tracking-widest hover:bg-blue-600 transition-all">{isAnalyzing ? "Analyse..." : "Vérifier le niveau"}</button>
                                    {workshopFeedback && (
                                        <div className="bg-zinc-900 border border-white/5 rounded-[2rem] p-8 space-y-4">
                                            <div className="text-2xl font-black italic text-blue-500 uppercase">{workshopFeedback.level}</div>
                                            <p className="text-zinc-400 italic">"{workshopFeedback.feedback}"</p>
                                            <p className="text-xs text-zinc-500 border-t border-white/5 pt-4 font-bold">Conseil : {workshopFeedback.suggestionC2}</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'Tuteur' && (
                                <div className="flex flex-col h-[70vh] bg-zinc-900/30 border border-white/10 rounded-[2rem] overflow-hidden animate-in">
                                    <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}><div className={`max-w-[85%] p-4 rounded-2xl text-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-200'}`}>{m.content}</div></div>
                                        ))}
                                    </div>
                                    <div className="p-4 bg-black flex gap-2">
                                        <input className="flex-1 bg-zinc-900 rounded-xl px-4 py-3 outline-none" placeholder="Message..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && setMessages([...messages, {role:'user', content: input}])} />
                                        <button className="bg-blue-600 p-3 px-6 rounded-xl font-bold uppercase text-[10px]">Envoyer</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
